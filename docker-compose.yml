services:
  lidarr-downloader:
    build: .
    container_name: lidarr-downloader
    restart: unless-stopped
    volumes:
      - ${HOST_DOWNLOAD_PATH:?err}:${DOWNLOAD_PATH:?err}
      - ${HOST_MUSIC_PATH:?err}:/music
      - ${HOST_CONFIG:?err}:/config
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=${UMASK:?err}
      - LIDARR_URL=${LIDARR_URL:?err}
      - LIDARR_API_KEY=${LIDARR_API_KEY:?err}
      - DOWNLOAD_PATH=${DOWNLOAD_PATH:?err}
      - LIDARR_PATH=${LIDARR_PATH:?err}
      - ACOUSTID_API_KEY=${ACOUSTID_API_KEY:-}
      # Automatic YouTube PO tokens via the bgutil provider sidecar below.
      # Set YT_POT_PROVIDER_URL="" to disable (and drop the sidecar).
      - YT_POT_PROVIDER_URL=${YT_POT_PROVIDER_URL:-http://bgutil-provider:4416}
    ports:
      - "127.0.0.1:${WEBUI_PORT:?err}:5000"
    depends_on:
      - bgutil-provider

  # Generates YouTube PO tokens so yt-dlp avoids "Sign in to confirm you're
  # not a bot" / format-unavailable errors.
  # https://github.com/Brainicism/bgutil-ytdlp-pot-provider
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    init: true
