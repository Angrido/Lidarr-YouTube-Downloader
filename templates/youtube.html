<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Import - Lidarr YouTube Downloader</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --bg: #09090b;
            --bg-pattern: radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(6, 214, 160, 0.05) 0%, transparent 50%);
            --surface: #18181b;
            --surface-glass: rgba(24, 24, 27, 0.7);
            --surface-hover: #27272a;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --primary: #10b981;
            --primary-hover: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #27272a;
            --border-glass: rgba(255, 255, 255, 0.1);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            --glow: 0 0 20px rgba(16, 185, 129, 0.3);
            --yt-red: #ff0000;
        }

        body.light {
            --bg: #f4f4f5;
            --bg-pattern: radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(6, 214, 160, 0.03) 0%, transparent 50%);
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.7);
            --surface-hover: #f4f4f5;
            --text: #18181b;
            --text-dim: #71717a;
            --border: #e4e4e7;
            --border-glass: rgba(0, 0, 0, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --glow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: var(--bg-pattern);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface-glass);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: linear-gradient(135deg, var(--primary), #06d6a0, #0891b2);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary), #06d6a0);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 0.9rem;
            border-radius: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-links a:hover { color: var(--text); background: var(--surface-hover); }
        .nav-links a.active { color: var(--yt-red); background: rgba(255, 0, 0, 0.08); }

        .controls { display: flex; gap: 0.75rem; align-items: center; }

        .theme-toggle {
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .theme-toggle:hover { background: var(--surface-hover); border-color: var(--primary); }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .page-title .yt-icon { color: var(--yt-red); }
        .page-desc { color: var(--text-dim); font-size: 0.95rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        .url-row {
            display: flex;
            gap: 0.75rem;
        }

        .url-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .url-input:focus { border-color: var(--primary); }
        .url-input::placeholder { color: var(--text-dim); }

        .btn {
            padding: 0.7rem 1.25rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.85; }

        .btn-ghost {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

        .fields-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .field-label { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

        .field-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-input:focus { border-color: var(--primary); }

        .playlist-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .playlist-thumbnail {
            width: 80px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface-hover);
        }

        .playlist-meta { flex: 1; min-width: 0; }
        .playlist-meta-title { font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-meta-sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.2rem; }

        .playlist-type-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 0, 0, 0.15);
            color: var(--yt-red);
            flex-shrink: 0;
        }

        .tracks-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .tracks-actions { display: flex; gap: 0.5rem; align-items: center; }

        .select-count {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-track { background: transparent; }
        .track-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .track-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
        }

        .track-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .track-item.selected { background: rgba(16, 185, 129, 0.06); border-color: rgba(16, 185, 129, 0.2); }

        .track-checkbox {
            width: 18px; height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .track-num {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            min-width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        .track-thumb {
            width: 48px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface-hover);
        }

        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-channel { color: var(--text-dim); font-size: 0.78rem; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .track-duration {
            color: var(--text-dim);
            font-size: 0.8rem;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .download-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .download-path-info {
            font-size: 0.82rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .progress-section { display: none; }
        .progress-section.visible { display: block; }

        .progress-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .progress-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-bar-wrap {
            background: var(--bg);
            border-radius: 999px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #06d6a0);
            border-radius: 999px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .tracks-progress {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .tp-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.7rem;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .tp-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .tp-status.pending { background: var(--border); color: var(--text-dim); }
        .tp-status.downloading { background: rgba(59, 130, 246, 0.2); color: #60a5fa; animation: pulse 1.5s infinite; }
        .tp-status.tagging { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .tp-status.done { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .tp-status.failed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .tp-status.skipped { background: var(--border); color: var(--text-dim); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tp-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tp-speed { color: var(--text-dim); font-size: 0.78rem; white-space: nowrap; }
        .tp-pct { color: var(--text-dim); font-size: 0.78rem; white-space: nowrap; }

        .hidden { display: none !important; }

        .alert {
            padding: 0.9rem 1.1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .alert-error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: var(--primary); border: 1px solid rgba(16, 185, 129, 0.2); }
        .alert-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.82rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .nav-container { padding: 0 1rem; }
            main { padding: 1rem; }
            .fields-row { grid-template-columns: 1fr; }
            .url-row { flex-direction: column; }
            .download-footer { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
        }

        @media (max-width: 600px) {
            .nav-links a span { display: none; }
            .nav-links a { padding: 0.5rem 0.6rem; }
        }
    </style>
</head>
<body>
<header>
    <div class="nav-container">
        <a href="/" class="logo" style="text-decoration:none;">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <span>LidarrYT</span>
        </a>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="/downloads"><i class="fas fa-download"></i> <span>Downloads</span></a>
            <a href="/logs"><i class="fas fa-list"></i> <span>Logs</span></a>
            <a href="/settings"><i class="fas fa-cog"></i> <span>Settings</span></a>
            <a href="/youtube" class="active"><i class="fab fa-youtube"></i> <span>YouTube</span></a>
        </div>
        <div class="controls">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="page-header">
        <h1 class="page-title">
            <i class="fab fa-youtube yt-icon"></i>
            YouTube Import
        </h1>
        <p class="page-desc">Download a YouTube video or playlist directly, without needing an artist defined in Lidarr.</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="card">
        <div class="card-title"><i class="fas fa-link"></i> YouTube URL</div>
        <div class="url-row">
            <input
                type="text"
                id="urlInput"
                class="url-input"
                placeholder="https://www.youtube.com/watch?v=... or playlist URL"
                autocomplete="off"
                spellcheck="false"
            >
            <button class="btn btn-primary" id="fetchBtn" onclick="fetchInfo()">
                <i class="fas fa-search"></i> Fetch
            </button>
        </div>
    </div>

    <div id="resultSection" class="hidden">
        <div class="card">
            <div id="playlistInfoBox" class="playlist-info hidden">
                <img id="playlistThumb" class="playlist-thumbnail" src="" alt="">
                <div class="playlist-meta">
                    <div class="playlist-meta-title" id="playlistTitle"></div>
                    <div class="playlist-meta-sub" id="playlistChannel"></div>
                </div>
                <span class="playlist-type-badge" id="playlistTypeBadge">Playlist</span>
            </div>

            <div class="fields-row">
                <div class="field-group">
                    <label class="field-label" for="artistInput">Artist Name</label>
                    <input type="text" id="artistInput" class="field-input" placeholder="e.g. Daft Punk">
                </div>
                <div class="field-group">
                    <label class="field-label" for="albumInput">Album / Collection Title</label>
                    <input type="text" id="albumInput" class="field-input" placeholder="e.g. Random Access Memories">
                </div>
            </div>

            <div class="tracks-header">
                <div class="card-title" style="margin-bottom:0;">
                    <i class="fas fa-music"></i>
                    Tracks
                    <span class="select-count" id="selectCount"></span>
                </div>
                <div class="tracks-actions">
                    <button class="btn btn-ghost" style="padding:0.4rem 0.8rem;font-size:0.82rem;" onclick="selectAll()">All</button>
                    <button class="btn btn-ghost" style="padding:0.4rem 0.8rem;font-size:0.82rem;" onclick="selectNone()">None</button>
                </div>
            </div>

            <div class="track-list" id="trackList"></div>

            <div class="download-footer">
                <div class="download-path-info" id="pathInfo">
                    <i class="fas fa-folder"></i>
                    <span>Files will be saved to the configured download path</span>
                </div>
                <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">
                    <i class="fas fa-download"></i> Download Selected
                </button>
            </div>
        </div>
    </div>

    <div class="progress-section" id="progressSection">
        <div class="progress-card">
            <div class="progress-header">
                <div class="progress-title">
                    <i class="fas fa-circle-notch spinner" id="progressSpinner"></i>
                    <span id="progressLabel">Downloading...</span>
                </div>
                <button class="btn btn-danger" style="padding:0.4rem 0.8rem;font-size:0.82rem;" onclick="stopDownload()">
                    <i class="fas fa-stop"></i> Stop
                </button>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="tracks-progress" id="tracksProgress"></div>
        </div>
    </div>
</main>

<footer>
    Lidarr YouTube Downloader v{{ APP_VERSION }}
</footer>

<script>
    let fetchedEntries = [];
    let sseSource = null;

    const themeKey = 'yt-theme';
    function applyTheme(t) {
        document.body.classList.toggle('light', t === 'light');
        document.getElementById('themeIcon').className = t === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }
    function toggleTheme() {
        const cur = localStorage.getItem(themeKey) || 'dark';
        const next = cur === 'dark' ? 'light' : 'dark';
        localStorage.setItem(themeKey, next);
        applyTheme(next);
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    applyTheme(localStorage.getItem(themeKey) || 'dark');

    function showAlert(msg, type) {
        const box = document.getElementById('alertBox');
        const icon = type === 'error' ? 'fa-circle-xmark' : type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        box.className = `alert alert-${type}`;
        box.innerHTML = `<i class="fas ${icon}"></i> ${escapeHtml(msg)}`;
        box.classList.remove('hidden');
        if (type !== 'error') setTimeout(() => box.classList.add('hidden'), 5000);
    }

    function hideAlert() {
        document.getElementById('alertBox').classList.add('hidden');
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function formatDuration(sec) {
        if (!sec) return '';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function updateSelectCount() {
        const boxes = document.querySelectorAll('.track-checkbox');
        const checked = Array.from(boxes).filter(b => b.checked).length;
        document.getElementById('selectCount').textContent = `(${checked} / ${boxes.length} selected)`;
        document.getElementById('downloadBtn').disabled = checked === 0;
    }

    function selectAll() {
        document.querySelectorAll('.track-checkbox').forEach(b => {
            b.checked = true;
            b.closest('.track-item').classList.add('selected');
        });
        updateSelectCount();
    }

    function selectNone() {
        document.querySelectorAll('.track-checkbox').forEach(b => {
            b.checked = false;
            b.closest('.track-item').classList.remove('selected');
        });
        updateSelectCount();
    }

    function buildTrackList(entries) {
        const list = document.getElementById('trackList');
        list.innerHTML = '';
        entries.forEach((entry, i) => {
            const item = document.createElement('div');
            item.className = 'track-item selected';
            item.dataset.index = i;

            const thumb = entry.thumbnail
                ? `<img class="track-thumb" src="${escapeHtml(entry.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="track-thumb"></div>`;

            item.innerHTML = `
                <input type="checkbox" class="track-checkbox" checked data-index="${i}">
                <span class="track-num">${i + 1}</span>
                ${thumb}
                <div class="track-info">
                    <div class="track-title" title="${escapeHtml(entry.title)}">${escapeHtml(entry.title)}</div>
                    ${entry.channel ? `<div class="track-channel">${escapeHtml(entry.channel)}</div>` : ''}
                </div>
                ${entry.duration ? `<span class="track-duration">${formatDuration(entry.duration)}</span>` : ''}
            `;

            item.querySelector('.track-checkbox').addEventListener('change', function() {
                item.classList.toggle('selected', this.checked);
                updateSelectCount();
            });

            item.addEventListener('click', function(e) {
                if (e.target.classList.contains('track-checkbox')) return;
                const cb = item.querySelector('.track-checkbox');
                cb.checked = !cb.checked;
                item.classList.toggle('selected', cb.checked);
                updateSelectCount();
            });

            list.appendChild(item);
        });
        updateSelectCount();
    }

    async function fetchInfo() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { showAlert('Please enter a YouTube URL.', 'error'); return; }

        hideAlert();
        const btn = document.getElementById('fetchBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Fetching...';
        document.getElementById('resultSection').classList.add('hidden');

        try {
            const resp = await fetch('/api/youtube/playlist/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
            });
            const data = await resp.json();

            if (!resp.ok || data.error) {
                showAlert(data.error || 'Failed to fetch info.', 'error');
                return;
            }

            fetchedEntries = data.entries || [];

            const infoBox = document.getElementById('playlistInfoBox');
            const firstThumb = fetchedEntries.find(e => e.thumbnail)?.thumbnail;
            if (data.type === 'playlist' || data.title) {
                infoBox.classList.remove('hidden');
                const thumbEl = document.getElementById('playlistThumb');
                if (firstThumb) {
                    thumbEl.src = firstThumb;
                    thumbEl.style.display = '';
                } else {
                    thumbEl.style.display = 'none';
                }
                document.getElementById('playlistTitle').textContent = data.title || '';
                document.getElementById('playlistChannel').textContent = data.channel ? `by ${data.channel}` : '';
                const badge = document.getElementById('playlistTypeBadge');
                badge.textContent = data.type === 'playlist' ? 'Playlist' : 'Video';
            } else {
                infoBox.classList.add('hidden');
            }

            const artistInput = document.getElementById('artistInput');
            const albumInput = document.getElementById('albumInput');
            if (!artistInput.value) artistInput.value = data.channel || '';
            if (!albumInput.value) albumInput.value = data.title || '';

            buildTrackList(fetchedEntries);
            document.getElementById('resultSection').classList.remove('hidden');

        } catch (e) {
            showAlert('Network error: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search"></i> Fetch';
        }
    }

    async function startDownload() {
        const artist = document.getElementById('artistInput').value.trim();
        const album = document.getElementById('albumInput').value.trim();

        if (!artist) { showAlert('Please enter an artist name.', 'error'); return; }
        if (!album) { showAlert('Please enter an album/collection title.', 'error'); return; }

        const checkboxes = document.querySelectorAll('.track-checkbox');
        const selected = [];
        checkboxes.forEach((cb, i) => { if (cb.checked) selected.push(fetchedEntries[i]); });
        if (selected.length === 0) { showAlert('Please select at least one track.', 'error'); return; }

        hideAlert();
        const btn = document.getElementById('downloadBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Starting...';

        try {
            const resp = await fetch('/api/youtube/playlist/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    artist_name: artist,
                    album_title: album,
                    entries: selected,
                }),
            });
            const data = await resp.json();

            if (!resp.ok || !data.success) {
                showAlert(data.message || 'Failed to start download.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-download"></i> Download Selected';
                return;
            }

            showAlert(data.message, 'success');
            initTracksProgress(selected);
            document.getElementById('progressSection').classList.add('visible');
            startSSE();

        } catch (e) {
            showAlert('Network error: ' + e.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-download"></i> Download Selected';
        }
    }

    function initTracksProgress(entries) {
        const container = document.getElementById('tracksProgress');
        container.innerHTML = '';
        entries.forEach((entry, i) => {
            const row = document.createElement('div');
            row.className = 'tp-item';
            row.id = `tp-${i}`;
            row.innerHTML = `
                <div class="tp-status pending" id="tp-status-${i}"><i class="fas fa-clock"></i></div>
                <span class="tp-title" title="${escapeHtml(entry.title || '')}">${escapeHtml(entry.title || `Track ${i+1}`)}</span>
                <span class="tp-pct" id="tp-pct-${i}"></span>
                <span class="tp-speed" id="tp-speed-${i}"></span>
            `;
            container.appendChild(row);
        });
    }

    const statusIcons = {
        pending: '<i class="fas fa-clock"></i>',
        searching: '<i class="fas fa-search"></i>',
        downloading: '<i class="fas fa-circle-notch spinner"></i>',
        tagging: '<i class="fas fa-tag"></i>',
        verifying: '<i class="fas fa-fingerprint"></i>',
        done: '<i class="fas fa-check"></i>',
        failed: '<i class="fas fa-xmark"></i>',
        skipped: '<i class="fas fa-forward"></i>',
    };

    function startSSE() {
        if (sseSource) sseSource.close();
        sseSource = new EventSource('/api/download/stream');

        sseSource.onmessage = function(e) {
            try {
                const payload = JSON.parse(e.data);
                const status = payload.status || {};
                const tracks = status.tracks || [];

                if (!status.active && tracks.length === 0) {
                    return;
                }

                const progress = status.progress || {};
                const pct = progress.overall_percent || 0;
                document.getElementById('progressBar').style.width = pct + '%';

                const done = tracks.filter(t => ['done','failed','skipped'].includes(t.status)).length;
                const total = tracks.length;
                document.getElementById('progressLabel').textContent =
                    status.active
                        ? `Downloading… ${done}/${total} tracks`
                        : `Completed: ${done}/${total} tracks`;

                if (!status.active) {
                    document.getElementById('progressSpinner').className = 'fas fa-check';
                    sseSource.close();
                    document.getElementById('downloadBtn').disabled = false;
                    document.getElementById('downloadBtn').innerHTML = '<i class="fas fa-download"></i> Download Selected';
                    showAlert(`Download complete! ${done}/${total} tracks downloaded.`, 'success');
                }

                tracks.forEach((t, i) => {
                    const statusEl = document.getElementById(`tp-status-${i}`);
                    const pctEl = document.getElementById(`tp-pct-${i}`);
                    const speedEl = document.getElementById(`tp-speed-${i}`);
                    if (!statusEl) return;
                    const s = t.status || 'pending';
                    statusEl.className = `tp-status ${s}`;
                    statusEl.innerHTML = statusIcons[s] || statusIcons.pending;
                    pctEl.textContent = t.status === 'downloading' ? (t.progress_percent || '') : '';
                    speedEl.textContent = t.status === 'downloading' ? (t.progress_speed || '') : '';
                });

            } catch (_) {}
        };

        sseSource.onerror = function() {
            sseSource.close();
        };
    }

    async function stopDownload() {
        await fetch('/api/download/stop', { method: 'POST' });
    }

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') fetchInfo();
    });
</script>
</body>
